<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animation Works | Kai Shen</title>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            padding: 80px 8%;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 呼吸感基础设定 */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }

        /* 离场时的缩放与变暗 */
        body.page-out {
            transform: scale(0.98);
            opacity: 0.6;
        }

        /* --- 2. 纯净淡入遮罩 --- */
        #page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 1; /* 初始全黑 */
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 3. 标题排版 --- */
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(28px, 5vw, 42px);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        p.subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 50px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 4. 返回按钮 --- */
        .back {
            text-align: center;
            margin-bottom: 60px;
        }

        .back a {
            color: #888;
            text-decoration: none;
            border: 1px solid #333;
            padding: 12px 30px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: inline-block;
        }

        .back a:hover {
            background: white;
            color: black;
            border-color: white;
            transform: translateY(-3px);
        }

        /* --- 5. 视频网格 --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        /* 视频卡片入场效果 */
        .video-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: 1s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .video-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .video-card:hover {
            border-color: #4da3ff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0.7;
        }

        .video-card:hover img {
            transform: scale(1.08);
            opacity: 1;
        }

        /* 播放图标 */
        .thumbnail-wrapper::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            color: white;
            opacity: 0.4;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .video-card:hover .thumbnail-wrapper::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .video-info {
            padding: 25px;
            text-align: center;
        }

        .video-info a {
            color: #4da3ff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .video-card:hover .video-info a {
            color: white;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            body { padding: 60px 6%; }
            .grid { gap: 30px; }
        }
    </style>
</head>
<body>

    <div id="page-transition"></div>

    <h1>Animation Works</h1>
    <p class="subtitle">Motion Graphics & Visual Storytelling</p>

    <div class="back">
        <a href="index.html">← Back to Home</a>
    </div>

    <div class="grid">
        <div class="video-card">
            <a href="https://youtu.be/BtfvEaumTNg" target="_blank">
                <div class="thumbnail-wrapper">
                    <img src="https://img.youtube.com/vi/BtfvEaumTNg/maxresdefault.jpg" alt="Animation 1">
                </div>
            </a>
            <div class="video-info">
                <a href="https://youtu.be/BtfvEaumTNg" target="_blank">Watch Animation 1</a>
            </div>
        </div>

        <div class="video-card">
            <a href="https://youtu.be/b26v6-xINYk" target="_blank">
                <div class="thumbnail-wrapper">
                    <img src="https://img.youtube.com/vi/b26v6-xINYk/maxresdefault.jpg" alt="Animation 2">
                </div>
            </a>
            <div class="video-info">
                <a href="https://youtu.be/b26v6-xINYk" target="_blank">Watch Animation 2</a>
            </div>
        </div>

        <div class="video-card">
            <a href="https://youtu.be/7wb344qvuxU" target="_blank">
                <div class="thumbnail-wrapper">
                    <img src="https://i.postimg.cc/CL98BKQS/ping-mu-jie-tu-2026-03-06-225131.png" alt="Animation 3">
                </div>
            </a>
            <div class="video-info">
                <a href="https://youtu.be/7wb344qvuxU" target="_blank">Watch Animation 3</a>
            </div>
        </div>

        <div class="video-card">
            <a href="https://youtu.be/SvqzIXZnLmk" target="_blank">
                <div class="thumbnail-wrapper">
                    <img src="https://img.youtube.com/vi/SvqzIXZnLmk/maxresdefault.jpg" alt="Animation 4">
                </div>
            </a>
            <div class="video-info">
                <a href="https://youtu.be/SvqzIXZnLmk" target="_blank">Watch Animation 4</a>
            </div>
        </div>
    </div>

    <div class="back" style="margin-top: 100px;">
        <a href="index.html">← Back to Home</a>
    </div>

    <script>
        // --- 1. 自然转场核心逻辑 ---
        window.addEventListener('load', () => {
            const transitionEl = document.getElementById('page-transition');
            
            // 进场：黑屏淡出
            requestAnimationFrame(() => {
                transitionEl.style.opacity = '0';
            });

            // 拦截链接跳转（仅限内部.html文件）
            document.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                const isExternal = link.getAttribute('target') === '_blank';

                if (href && href.includes('.html') && !isExternal && !href.startsWith('http')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        
                        // 离场：黑屏淡入 + 页面微缩
                        transitionEl.style.opacity = '1';
                        document.body.classList.add('page-out');

                        setTimeout(() => {
                            window.location.href = href;
                        }, 750);
                    });
                }
            });
        });

        // --- 2. 滚动入场效果 ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const allCards = Array.from(document.querySelectorAll('.video-card'));
                    const index = allCards.indexOf(entry.target);
                    // 增加一点交错感
                    setTimeout(() => {
                        entry.target.classList.add('show');
                    }, (index % 3) * 150);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.video-card').forEach(el => observer.observe(el));
    </script>

</body>
</html>
