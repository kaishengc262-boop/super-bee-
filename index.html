<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kai Shen | Design Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { 
            background: #000; color: white; overflow-x: hidden; -webkit-font-smoothing: antialiased; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        body.page-out { transform: scale(0.98); opacity: 0.6; }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #page-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 1; pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 8%; z-index: 1000;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            animation: customFadeUp 1s ease forwards;
        }
        .logo { font-size: 14px; letter-spacing: 5px; font-weight: 900; color: #fff; text-decoration: none; }
        nav a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; opacity: 0.5; text-transform: uppercase; margin-left: 20px; transition: 0.3s; }

        /* --- 4. HERO 气泡 (极限亮度版) --- */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .parallax-scene { position: absolute; inset: -25%; z-index: 1; pointer-events: none; }
        
        .bubble {
            position: absolute; border-radius: 50%; opacity: 0; will-change: transform;
            /* 物理光感叠加模式：重叠处会爆亮 */
            mix-blend-mode: plus-lighter; 
            animation: bubbleFadeIn 3.5s ease forwards;
        }
        @keyframes bubbleFadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 颜色：极高浓度 + 复合光晕 */
        .bubble1 { 
            width: 70vw; height: 70vw; top: -15%; left: -20%; 
            background: radial-gradient(circle at center, rgba(255, 40, 40, 0.9) 0%, rgba(255, 0, 0, 0) 70%); 
            filter: blur(50px);
            /* 额外增加一层外发光辐射 */
            border-radius: 50%;
            box-shadow: 0 0 100px rgba(255, 20, 20, 0.4);
        }
        .bubble2 { 
            width: 60vw; height: 60vw; bottom: -10%; right: -15%; 
            background: radial-gradient(circle at center, rgba(40, 90, 255, 0.9) 0%, rgba(0, 0, 255, 0) 70%); 
            filter: blur(60px);
            box-shadow: 0 0 120px rgba(20, 50, 255, 0.4);
        }
        .bubble3 { 
            width: 45vw; height: 45vw; top: 25%; left: 30%; 
            background: radial-gradient(circle at center, rgba(0, 255, 200, 0.8) 0%, rgba(0, 255, 100, 0) 70%); 
            filter: blur(45px);
            box-shadow: 0 0 80px rgba(0, 255, 150, 0.3);
        }

        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { 
            font-size: clamp(50px, 14vw, 100px); font-weight: 900; line-height: 0.9; letter-spacing: -2px; margin-bottom: 25px; 
            text-shadow: 0 0 30px rgba(0,0,0,0.8); 
            opacity: 0; animation: customFadeUp 1.2s ease 0.4s forwards; 
        }
        .hero-content p { color: #eee; margin-bottom: 35px; font-size: 15px; opacity: 0; animation: customFadeUp 1.2s ease 0.6s forwards; }
        .btn-group { opacity: 0; animation: customFadeUp 1.2s ease 0.8s forwards; }
        
        .btn { padding: 15px 30px; border: 1px solid #fff; color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; display: inline-block; cursor: pointer; }
        .btn:hover { background: #fff; color: #000; }
        .btn.primary { background: #fff; color: #000; margin-right: 10px; }

        /* --- 5. WORK 区域 --- */
        .work-section { background: #ffffff; color: #000; padding: 120px 8%; position: relative; }
        .work-grid-bg { 
            position: absolute; inset: 0; z-index: 1; pointer-events: none; 
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px); 
            background-size: 35px 35px; 
        }
        .work-section h2 { font-size: clamp(30px, 7vw, 45px); font-weight: 900; text-align: center; margin-bottom: 80px; position: relative; z-index: 2; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px 40px; position: relative; z-index: 2; }
        .work-item { text-decoration: none; color: #000; opacity: 0; transform: translateY(30px); transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); }
        .work-item.show { opacity: 1; transform: translateY(0); }
        .img-container { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #eee; margin-bottom: 15px; }
        .img-container::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%) skewX(-25deg); background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.6), transparent); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .work-item:hover .img-container::after { transform: translateX(150%) skewX(-25deg); }
        .work-item img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .work-item:hover img { transform: scale(1.08); }
        .work-label { font-size: 11px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; text-align: center; display: block; }

        .contact { padding: 150px 8%; text-align: center; background: #000; color: #fff; }
        footer { padding: 60px 8%; text-align: center; border-top: 1px solid #111; font-size: 10px; color: #444; letter-spacing: 2px; background: #000; }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 60px; }
            .btn { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>

<div id="page-transition"></div>

<header>
    <a href="index.html" class="logo">KAI SHEN</a>
    <nav>
        <a href="#work">Work</a>
        <a href="https://wa.me/60174769089">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="parallax-scene" id="scene">
        <div class="bubble bubble1" data-depth="0.1"></div>
        <div class="bubble bubble2" data-depth="0.2"></div>
        <div class="bubble bubble3" data-depth="0.35"></div>
    </div>
    <div class="hero-content">
        <h1>KS<br>PORTFOLIO</h1>
        <p>Minimalist designer specializing in motion visuals & branding.</p>
        <div class="btn-group">
            <a href="#work" class="btn primary">View Works</a>
            <a href="https://wa.me/60174769089" class="btn">WhatsApp</a>
        </div>
    </div>
</section>

<section id="work" class="work-section">
    <div class="work-grid-bg"></div>
    <h2>My Works</h2>
    <div class="gallery">
        <a href="poster.html" class="work-item">
            <div class="img-container"><img src="https://i.postimg.cc/59PrQ301/ELDEN-RING-3.jpg"></div>
            <span class="work-label">Poster Design</span>
        </a>
        <a href="animation.html" class="work-item">
            <div class="img-container"><img src="https://i.postimg.cc/X7nj26By/ping-mu-jie-tu-2026-03-06-212904.png"></div>
            <span class="work-label">Animation</span>
        </a>
        <a href="logo.html" class="work-item">
            <div class="img-container"><img src="https://i.postimg.cc/DZzQQMdn/logo-lsss-01.jpg"></div>
            <span class="work-label">Logo Branding</span>
        </a>
    </div>
</section>

<section class="contact">
    <h2>Let's Talk</h2>
    <a href="https://wa.me/60174769089" class="btn">Start a Project</a>
</section>

<footer>© 2026 KAI SHEN.</footer>

<script>
    window.addEventListener('load', () => {
        const transitionEl = document.getElementById('page-transition');
        requestAnimationFrame(() => { transitionEl.style.opacity = '0'; });
        document.querySelectorAll('a').forEach(link => {
            const href = link.getAttribute('href');
            if (href && href.includes('.html') && !href.startsWith('http') && !href.startsWith('#')) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    transitionEl.style.opacity = '1';
                    document.body.classList.add('page-out');
                    setTimeout(() => { window.location.href = href; }, 750);
                });
            }
        });
    });

    const scene = document.getElementById('scene');
    const bubbles = scene.querySelectorAll('.bubble');
    function updateParallax(x, y) {
        bubbles.forEach(b => {
            const d = b.getAttribute('data-depth');
            // 稍微增加了移动幅度，让亮光流动感更强
            b.style.transform = `translate3d(${x * d * 220}px, ${y * d * 220}px, 0)`;
        });
    }

    document.addEventListener('mousemove', (e) => {
        if (window.innerWidth > 768) {
            updateParallax((e.clientX / window.innerWidth - 0.5), (e.clientY / window.innerHeight - 0.5));
        }
    });

    function handleMotion(e) {
        if (window.innerWidth <= 768) {
            const x = e.gamma / 45; 
            const y = (e.beta - 40) / 45; 
            updateParallax(x, y);
        }
    }

    let gyroActivated = false;
    function activateGyro() {
        if (gyroActivated) return;
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', handleMotion);
                    gyroActivated = true;
                }
            });
        } else {
            window.addEventListener('deviceorientation', handleMotion);
            gyroActivated = true;
        }
    }
    document.body.addEventListener('click', activateGyro, { once: true });
    document.body.addEventListener('touchstart', activateGyro, { once: true });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) entry.target.classList.add('show');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.work-item').forEach(el => observer.observe(el));
</script>
</body>
</html>
