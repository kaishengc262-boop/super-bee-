<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poster Works | Kai Shen</title>
    <style>
        /* --- 1. 基础重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
        
        body { 
            background: #0a0a0a; 
            color: white; 
            padding: 80px 10%; 
            line-height: 1.6; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 页面呼吸感基础设定 */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease; 
        }

        /* 离场时的缩放与变暗 */
        body.page-out {
            transform: scale(0.98);
            opacity: 0.6;
        }

        /* --- 2. 纯净淡入遮罩 (已同步 Logo 版) --- */
        #page-transition {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #000; 
            z-index: 9999;
            opacity: 1; /* 初始全黑 */
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 3. 标题排版 --- */
        h1 { text-align: center; font-size: clamp(30px, 6vw, 45px); letter-spacing: 5px; text-transform: uppercase; font-weight: 900; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #555; margin-bottom: 60px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- 4. 返回按钮 --- */
        .back { text-align: center; margin: 40px 0; }
        .back a { 
            color: #888; 
            text-decoration: none; 
            border: 1px solid #333; 
            padding: 12px 25px; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); 
            display: inline-block; 
        }
        .back a:hover { background: white; color: black; border-color: white; transform: translateY(-3px); }

        /* --- 5. 海报网格 --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .item { 
            position: relative; 
            cursor: pointer; 
            opacity: 0; 
            transform: translateY(30px); 
            transition: 1s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        .item.show { opacity: 1; transform: translateY(0); }
        
        .item img { 
            width: 100%; 
            aspect-ratio: 1 / 1.414; 
            object-fit: cover; 
            border: 1px solid #222; 
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); 
        }
        .item:hover img { transform: scale(1.04); border-color: #555; }

        /* --- 6. 灯箱 (已优化弹出感) --- */
        .lightbox { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.96); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
            z-index: 2000; 
        }
        .lightbox img { 
            max-width: 90%; 
            max-height: 85%; 
            object-fit: contain; 
            transform: scale(0.9); 
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox.active img { transform: scale(1); }

        @media(max-width: 768px) { body { padding: 60px 6%; } }
    </style>
</head>
<body>

<div id="page-transition"></div>

<h1>Poster Works</h1>
<p class="subtitle">Selected Visual Designs</p>

<div class="back"><a href="index.html">← Back to Home</a></div>

<div class="grid">
    <div class="item"><img src="https://i.postimg.cc/59PrQ301/ELDEN-RING-3.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/sgWH8C46/typography-ass1-33333333.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/NfSVDqnp/17-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/nzwbts3w/9-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/7619gj2f/5-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/Y98g27gp/4-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/5NNGNL7t/15-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/c4pQ5Nns/12-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/QtDhdmyx/1-01-jpg.jpg"></div>
    <div class="item"><img src="https://i.postimg.cc/DwfTcfGS/6-01-jpg.jpg"></div>
</div>

<div class="back" style="margin-top: 100px;"><a href="index.html">← Back to Home</a></div>

<div class="lightbox" id="lightbox"><img id="lightbox-img"></div>

<script>
    // --- 1. 自然转场核心逻辑 ---
    window.addEventListener('load', () => {
        const transitionEl = document.getElementById('page-transition');
        
        // 进场：黑屏淡出
        requestAnimationFrame(() => {
            transitionEl.style.opacity = '0';
        });

        // 拦截链接跳转
        document.querySelectorAll('a').forEach(link => {
            if (link.href.includes(window.location.origin) && !link.href.includes('#') && link.getAttribute('target') !== '_blank') {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = link.href;

                    // 离场：黑屏淡入 + 页面微缩
                    transitionEl.style.opacity = '1';
                    document.body.classList.add('page-out');

                    setTimeout(() => { window.location.href = target; }, 750);
                });
            }
        });
    });

    // --- 2. 灯箱交互逻辑 ---
    const items = document.querySelectorAll('.item img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    items.forEach(img => {
        img.addEventListener('click', () => {
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
        });
    });

    lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
    });

    // --- 3. 滚动入场动画 ---
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) {
                const allItems = Array.from(document.querySelectorAll('.item'));
                const index = allItems.indexOf(entry.target);
                // 采用交错淡入，视觉更自然
                setTimeout(() => { entry.target.classList.add('show'); }, (index % 3) * 120);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.item').forEach(el => observer.observe(el));
</script>
</body>
</html>
