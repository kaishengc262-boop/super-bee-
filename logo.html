<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logo Works | Kai Shen</title>
    <style>
        /* --- 1. 基础重置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            padding: 80px 10%;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* 页面呼吸感基础设定 */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }

        /* 离场时的缩放与变暗 */
        body.page-out {
            transform: scale(0.98);
            opacity: 0.6;
        }

        /* --- 2. 纯净淡入遮罩 --- */
        #page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 1; /* 初始全黑 */
            pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 3. 标题与排版 --- */
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: clamp(30px, 6vw, 42px);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 60px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 4. 返回按钮 --- */
        .back {
            text-align: center;
            margin-bottom: 60px;
        }

        .back a {
            color: #888;
            text-decoration: none;
            border: 1px solid #333;
            padding: 12px 30px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: inline-block;
        }

        .back a:hover {
            background: white;
            color: black;
            border-color: white;
            transform: translateY(-3px);
        }

        /* --- 5. 作品网格 --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .item {
            position: relative;
            overflow: hidden;
            border-radius: 4px; /* 稍微减小圆角，更显精致 */
            cursor: pointer;
            background: white; /* 确保容器底色 */
            opacity: 0;
            transform: translateY(20px);
            transition: 1s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: white;
            padding: 50px; /* 增加留白，LOGO更显高级 */
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .item:hover img {
            transform: scale(1.05);
        }

        /* --- 6. 灯箱 (Lightbox) --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 2000;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
            transform: scale(0.9);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        /* MOBILE */
        @media(max-width: 768px) {
            body { padding: 60px 6%; }
            .item img { padding: 30px; }
        }
    </style>
</head>

<body>

    <div id="page-transition"></div>

    <h1>Logo Works</h1>
    <p class="subtitle">Brand Identity & Visual Marks</p>

    <div class="back">
        <a href="index.html">← Back to Home</a>
    </div>

    <div class="grid">
        <div class="item" onclick="openLightbox(this)">
            <img src="https://i.postimg.cc/5yCCndHV/logo-beitou-01.jpg">
        </div>

        <div class="item" onclick="openLightbox(this)">
            <img src="https://i.postimg.cc/DZzQQMdn/logo-lsss-01.jpg">
        </div>

        <div class="item" onclick="openLightbox(this)">
            <img src="https://i.postimg.cc/W34mmH6s/Untitled-1-01.jpg">
        </div>
    </div>

    <div class="back" style="margin-top: 100px;">
        <a href="index.html">← Back to Home</a>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img">
    </div>

    <script>
        // --- 1. 自然转场逻辑 ---
        window.addEventListener('load', () => {
            const transitionEl = document.getElementById('page-transition');
            
            // 进场：黑屏淡出
            requestAnimationFrame(() => {
                transitionEl.style.opacity = '0';
            });

            // 拦截链接跳转
            document.querySelectorAll('a').forEach(link => {
                if (link.href.includes(window.location.origin) && !link.href.includes('#') && link.getAttribute('target') !== '_blank') {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const target = link.href;

                        // 离场：黑屏淡入 + 页面微缩
                        transitionEl.style.opacity = '1';
                        document.body.classList.add('page-out');

                        setTimeout(() => {
                            window.location.href = target;
                        }, 750);
                    });
                }
            });
        });

        // --- 2. 灯箱逻辑 ---
        function openLightbox(element){
            const imgUrl = element.querySelector("img").src;
            const lb = document.getElementById('lightbox');
            document.getElementById("lightbox-img").src = imgUrl;
            lb.classList.add('active');
        }

        function closeLightbox(){
            document.getElementById('lightbox').classList.remove('active');
        }

        // --- 3. 滚动入场效果 ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.item').forEach(el => observer.observe(el));
    </script>

</body>
</html>
